name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Sadece v1.0.0, v2.1.3 gibi tag'ler pushlandığında tetiklenir

jobs:
  build-and-release:
    runs-on: windows-latest # .exe derlemek için yerleşik Windows ortamı
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 openpyxl pyinstaller
          # Eğer projende bir requirements.txt varsa üstteki satır yerine şunu kullan:
          # pip install -r requirements.txt

      - name: Build Executable
        run: |
          # Ana dosyanın adının main.py olduğunu varsayıyoruz. 
          # Kendi projene göre bu ismi değiştir.
          pyinstaller --onefile --windowed main.py

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/main.exe
          generate_release_notes: true
